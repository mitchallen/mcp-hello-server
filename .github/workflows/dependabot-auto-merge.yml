name: dependabot-auto-merge
# Auto-merges Dependabot's GitHub Actions bumps once required CI checks pass.
# Native auto-merge waits for the branch-protection checks on main (unit + bdd),
# so a bump only lands if the workflows still go green. Other ecosystems
# (docker base image, pip deps) are intentionally left for manual review.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      - name: Enable auto-merge for GitHub Actions updates
        if: startsWith(steps.metadata.outputs.package-ecosystem, 'github')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
